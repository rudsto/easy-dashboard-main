<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Lumen — Agentic Trading</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="data.jsx"></script>
  <script type="text/babel" src="primitives.jsx"></script>
  <script type="text/babel" src="pinned-cards.jsx"></script>
  <script type="text/babel" src="shell.jsx"></script>
  <script type="text/babel" src="timeline.jsx"></script>
  <script type="text/babel" src="tweaks-panel.jsx"></script>

  <script type="text/babel" data-presets="react">
    const { useEffect } = React;

    const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "theme": "dark",
      "density": "default",
      "layout": "full",
      "accent": "#cc785c",
      "showGuardrails": true,
      "showTrustBar": true
    }/*EDITMODE-END*/;

    function App() {
      const [tweaks, setTweaks] = useTweaks(TWEAK_DEFAULTS);

      useEffect(() => {
        const r = document.documentElement;
        r.dataset.theme = tweaks.theme;
        r.dataset.density = tweaks.density;
        r.dataset.layout = tweaks.layout;
        r.style.setProperty("--accent", tweaks.accent);
      }, [tweaks]);

      return (
        <>
          <div className="app">
            <Sidebar />
            <main className="main">
              <Header />
              <Timeline />
              <Composer />
            </main>
            <RightRail />
          </div>

          <TweaksPanel title="Tweaks">
            <TweakSection title="Theme">
              <TweakRadio
                value={tweaks.theme}
                onChange={(v) => setTweaks({ theme: v })}
                options={[
                  { value: "dark", label: "Dark" },
                  { value: "light", label: "Light" },
                ]}
              />
            </TweakSection>
            <TweakSection title="Density">
              <TweakRadio
                value={tweaks.density}
                onChange={(v) => setTweaks({ density: v })}
                options={[
                  { value: "default", label: "Spacious" },
                  { value: "cozy", label: "Cozy" },
                  { value: "compact", label: "Compact" },
                ]}
              />
            </TweakSection>
            <TweakSection title="Layout">
              <TweakRadio
                value={tweaks.layout}
                onChange={(v) => setTweaks({ layout: v })}
                options={[
                  { value: "full", label: "Full (sidebar + rail)" },
                  { value: "focus", label: "Focus (chat only)" },
                ]}
              />
            </TweakSection>
            <TweakSection title="Accent color">
              <TweakColor value={tweaks.accent} onChange={(v) => setTweaks({ accent: v })} />
            </TweakSection>
          </TweaksPanel>
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
